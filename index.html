<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IELTS Pro</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="loader-logo">
    <h1>IELTS <span>Pro</span></h1>
    <div class="spin"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="badge">✦ IELTS Pro</div>
      <h1>Welcome <span>back</span></h1>
      <p>Enter your student ID to continue</p>
    </div>
    <div id="login-error" class="error-msg">Student not found. Check your name and ID.</div>
    <div class="form-group"><label>Full Name</label><input type="text" id="input-name" placeholder="e.g. Miravzal Salakhiddinov"/></div>
    <div class="form-group"><label>Student ID</label><input type="text" id="input-code" placeholder="e.g. 7760371"/></div>
    <button class="btn btn-primary" onclick="studentLogin()">Enter Platform</button>
    <button class="btn btn-ghost" onclick="window.location.href='admin.html'">Admin Panel →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

async function studentLogin() {
  const name=document.getElementById('input-name').value.trim();
  const code=document.getElementById('input-code').value.trim();
  if(!name||!code) return toast('Enter your name and ID','error');
  try {
    const rows = await get(`students?name=ilike.${encodeFilterValue(name)}&student_code=eq.${encodeFilterValue(code)}&select=*,groups(name)`);
    if(!rows.length){ document.getElementById('login-error').classList.add('show'); return; }
    document.getElementById('login-error').classList.remove('show');
    setStudentSession(rows[0]);
    window.location.href = 'student.html';
  } catch(e){ toast(e.message,'error'); }
}

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('screen-login').classList.contains('active')) studentLogin();
});

window.addEventListener('load', ()=>{
  setTimeout(()=>{
    if (getStudentSession()) { window.location.href='student.html'; return; }
    showScreen('screen-login');
  }, 500);
});
</script>
</body>
</html>
